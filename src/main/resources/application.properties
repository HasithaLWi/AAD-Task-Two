spring.application.name=TaskTwo



server.port=8080


spring.datasource.url=jdbc:mysql://localhost:3306/aad_task_two?createDatabaseIfNotExist=true


spring.datasource.username=root


spring.datasource.password=mysql
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


spring.jpa.hibernate.ddl-auto=update

# Shows the generated SQL queries in the console
spring.jpa.show-sql=true

# Formats the SQL queries in the console to make them readable
spring.jpa.properties.hibernate.format_sql=true

# Explicitly sets the SQL dialect (Optional but recommended)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

